<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书评论洞察助手</title>
  <link rel="stylesheet" href="sidepanel.css">
  <!-- 引入 marked.js 用于 Markdown 渲染（本地文件） -->
  <script src="lib/marked.min.js"></script>
  <!-- 引入 SheetJS 用于导出 Excel -->
  <script src="lib/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 小红书评论总结</h1>
      <p class="subtitle">DeepSeek · AI分析</p>
    </header>

    <!-- 按钮区域 -->
    <div class="button-section">
      <button id="extractTitle" class="btn btn-primary btn-full" disabled>
        📌 笔记标题
      </button>
      <div class="btn-row">
        <button id="extractComments" class="btn btn-secondary" disabled>
          💎 精华评论
        </button>
        <button id="startSummary" class="btn btn-secondary" disabled>
          📊 评论汇总
        </button>
      </div>
    </div>

    <!-- 提示信息 -->
    <div class="hint-section">
      <p id="hintText" class="hint-text"></p>
    </div>

    <!-- 内容展示区域 -->
    <div class="content-section">
      <!-- 标题展示 -->
      <div id="titleResult" class="result-block hidden">
        <h3>笔记标题</h3>
        <div id="titleContent" class="result-content"></div>
      </div>

      <!-- 精华评论展示 -->
      <div id="commentsResult" class="result-block hidden">
        <h3>精华评论</h3>
        <div id="commentsContent" class="result-content markdown-body"></div>
      </div>

      <!-- 评论汇总展示 -->
      <div id="summaryResult" class="result-block hidden">
        <h3>评论汇总</h3>
        <div id="summaryContent" class="result-content markdown-body"></div>
      </div>

      <!-- 加载状态 -->
      <div id="loadingSection" class="loading-section hidden">
        <div class="loading-spinner"></div>
        <p>正在思考中……</p>
      </div>
    </div>

    <!-- 暂存控制区域 -->
    <div class="save-section">
      <button id="saveCurrentBtn" class="btn btn-save btn-full" disabled>
        💾 暂存当前结果
      </button>
      <div class="btn-row">
        <button id="viewSavedBtn" class="btn btn-outline">
          📋 查看已暂存 (<span id="savedCount">0</span>)
        </button>
        <button id="batchExportBtn" class="btn btn-export" disabled>
          📥 批量导出
        </button>
      </div>
    </div>

    <!-- 导出区域 -->
    <div id="exportSection" class="export-section hidden">
      <button id="exportAllBtn" class="btn btn-export btn-full">
        📥 导出当前分析结果为 Excel
      </button>
    </div>
  </div>

  <!-- 暂存列表模态框 -->
  <div id="savedModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>已暂存的分析结果</h3>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="filter-section">
          <label><input type="checkbox" id="filterComments" checked> 显示精华评论</label>
          <label><input type="checkbox" id="filterSummaries" checked> 显示汇总分析</label>
        </div>
        <div id="savedList" class="saved-list"></div>
      </div>
      <div class="modal-footer">
        <button id="selectAllBtn" class="btn btn-secondary">全选</button>
        <button id="exportSelectedBtn" class="btn btn-primary" disabled>导出选中项</button>
        <button id="clearAllBtn" class="btn btn-danger">清空全部</button>
      </div>
    </div>
  </div>
  </div>

  <!-- 配置文件（包含 API Key） -->
  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
